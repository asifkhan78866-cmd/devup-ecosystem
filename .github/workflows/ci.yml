name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - workspace: frontend
          - workspace: backend
          - workspace: backend/admin

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '${{ matrix.workspace }}/package-lock.json'

      - name: Install dependencies
        working-directory: ${{ matrix.workspace }}
        run: npm ci

      - name: Generate Prisma client (backend only)
        if: matrix.workspace == 'backend'
        working-directory: backend
        run: npx prisma generate

      - name: Type check
        working-directory: ${{ matrix.workspace }}
        run: npx tsc --noEmit

      - name: Lint
        working-directory: ${{ matrix.workspace }}
        run: npm run lint
        continue-on-error: false

  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-type-check

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devup_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/devup_test
      DIRECT_URL: postgresql://test:test@localhost:5432/devup_test
      JWT_SECRET: test-jwt-secret-minimum-32-characters-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: Install
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Migrate test DB
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend
        run: npm test

  verify-deployments:
    name: Verify Live Deployments
    runs-on: ubuntu-latest
    needs: [lint-and-type-check, backend-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Wait for Render + Vercel auto-deploy
        run: sleep 60

      - name: Check backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://devup-eco.onrender.com/health)
          echo "Backend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Backend not healthy yet (cold start is normal on Render free tier)"
          fi

      - name: Check frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            https://devup-ecosystem.vercel.app)
          echo "Frontend status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            exit 1
          fi
