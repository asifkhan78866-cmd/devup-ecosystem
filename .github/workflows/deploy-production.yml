name: Deploy Production

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy backend to Railway
        working-directory: backend
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Run Prisma migrations on production
        working-directory: backend
        run: railway run --service backend npx prisma migrate deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Verify backend health
        run: |
          sleep 30
          curl -f https://api.devupecosystem.in/health || exit 1

  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        working-directory: frontend
        run: vercel pull --yes --environment=production
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build frontend
        working-directory: frontend
        run: vercel build --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        working-directory: frontend
        run: vercel deploy --prebuilt --prod
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Verify frontend
        run: curl -f https://devupecosystem.in || exit 1

  deploy-admin:
    name: Deploy Admin to Railway
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "backend/admin/package-lock.json"

      - name: Install admin deps
        working-directory: backend/admin
        run: npm ci

      - name: Build admin
        working-directory: backend/admin
        run: npm run build
        env:
          VITE_API_URL: https://api.devupecosystem.in
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_ENV: production

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy admin to Railway
        working-directory: backend/admin
        run: railway up --service admin --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  notify-deploy:
    name: Notify Team
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-admin]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - name: Notify success
        if: env.SLACK_WEBHOOK_URL != '' && needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success' && needs.deploy-admin.result == 'success'
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-type: application/json' \
          -d '{
            "text": "DevUp Ecosystem deployed to production",
            "attachments": [{
              "color": "#c8f135",
              "fields": [
                {"title": "Frontend", "value": "https://devupecosystem.in", "short": true},
                {"title": "API", "value": "https://api.devupecosystem.in", "short": true},
                {"title": "Admin", "value": "https://admin.devupecosystem.in", "short": true},
                {"title": "Commit", "value": "${{ github.sha }}", "short": true}
              ]
            }]
          }'

      - name: Notify failure
        if: env.SLACK_WEBHOOK_URL != '' && failure()
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
          -H 'Content-type: application/json' \
          -d '{"text":"DevUp Ecosystem deployment failed. Check GitHub Actions."}'
